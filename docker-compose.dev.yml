services:
  postgres:
    image: postgres:16-alpine
    container_name: placemate-dev-postgres
    environment:
      POSTGRES_DB: placemate_ai
      POSTGRES_USER: placemate
      POSTGRES_PASSWORD: placemate
    ports:
      - "5432:5432"
    volumes:
      - placemate_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U placemate -d placemate_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: placemate-dev-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: placemate-dev-api
    environment:
      DATABASE_URL: postgresql://placemate:placemate@postgres:5432/placemate_ai?schema=public
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 7d
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: ""
      DISABLE_AI_SERVICE: "true"
      REDIS_URL: redis://redis:6379
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - api_dev_uploads:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: placemate-dev-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_NAME: PlaceMate AI
      NEXT_PUBLIC_USE_MOCK_API: "false"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  placemate_dev_postgres_data:
  api_dev_uploads:
