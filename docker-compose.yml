services:
  postgres:
    image: postgres:16-alpine
    container_name: placemate-postgres
    environment:
      POSTGRES_DB: placemate_ai
      POSTGRES_USER: placemate
      POSTGRES_PASSWORD: placemate
    ports:
      - "5432:5432"
    volumes:
      - placemate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U placemate -d placemate_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: placemate-ai-service
    ports:
      - "8001:8001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: placemate-api
    environment:
      DATABASE_URL: postgresql://placemate:placemate@postgres:5432/placemate_ai?schema=public
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 7d
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:8001
    command: sh -c "npx prisma db push && node dist/main.js"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - api_uploads:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: placemate-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_NAME: PlaceMate AI
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  placemate_postgres_data:
  api_uploads:
